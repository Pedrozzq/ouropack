<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>OuroPack | Caixas de Papelão Premium</title>
  <meta name="description" content="Caixas de papelão resistentes, sustentáveis e de qualidade premium para empresas, mudanças e embalagens personalizadas." />

  <!-- Google Fonts - Montserrat para um visual Premium -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700;800&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --gold-1: #f6cf7a;
      --gold-2: #dba13a;
      --gold-3: #b97818;
      --text-muted: #cfcfcf;
      --font-main: 'Montserrat', sans-serif;
    }

    body {
      min-height: 100vh;
      font-family: var(--font-main); /* Fonte Premium */
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      overflow-x: hidden;
      /* Fundo premium ligeiramente mais rico */
      background:
        radial-gradient(circle at 20% 30%, rgba(255, 196, 82, 0.18), transparent 30%),
        radial-gradient(circle at 80% 20%, rgba(255, 208, 120, 0.15), transparent 35%),
        radial-gradient(circle at 50% 80%, rgba(219, 161, 58, 0.12), transparent 40%),
        linear-gradient(135deg, #050505 0%, #0f0f12 40%, #16161a 100%);
      position: relative;
    }

    /* Textura de ruído sutil */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 30px 30px;
      mask-image: radial-gradient(circle at center, black 40%, transparent 100%);
      pointer-events: none;
      z-index: 0;
      opacity: 0.4;
    }

    /* Brilho de fundo animado */
    body::after {
      content: "";
      position: fixed;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(233, 170, 64, 0.15), transparent 65%);
      top: -150px;
      right: -150px;
      filter: blur(40px);
      pointer-events: none;
      z-index: 0;
      animation: floatGlow 8s ease-in-out infinite;
    }

    /* --- PARTÍCULAS DE FUNDO --- */
    .particles {
      position: fixed;
      inset: 0;
      overflow: hidden;
      z-index: 1;
      pointer-events: none;
    }

    .particles span {
      position: absolute;
      display: block;
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: rgba(255, 209, 122, 0.4);
      box-shadow: 0 0 10px rgba(255, 209, 122, 0.2);
      animation: riseParticles 18s linear infinite;
      bottom: -10px;
    }
    /* Variações para as partículas */
    .particles span:nth-child(1) { left: 10%; animation-duration: 15s; animation-delay: 0s; }
    .particles span:nth-child(2) { left: 25%; animation-duration: 20s; animation-delay: 2s; width: 2px; height: 2px; }
    .particles span:nth-child(3) { left: 40%; animation-duration: 17s; animation-delay: 4s; }
    .particles span:nth-child(4) { left: 55%; animation-duration: 22s; animation-delay: 1s; width: 4px; height: 4px;}
    .particles span:nth-child(5) { left: 70%; animation-duration: 16s; animation-delay: 3s; }
    .particles span:nth-child(6) { left: 85%; animation-duration: 19s; animation-delay: 5s; width: 2px; height: 2px;}


    /* --- NOVA ANIMAÇÃO DE ENTRADA (CAIXAS FLUTUANTES) --- */
    .intro-overlay {
      position: fixed;
      inset: 0;
      z-index: 10; /* Acima do fundo, abaixo do cartão final */
      pointer-events: none;
      perspective: 1000px;
    }

    .intro-box {
      position: absolute;
      bottom: -150px; /* Começa fora da tela embaixo */
      width: 100px;
      height: auto;
      display: block;
      opacity: 0;
      filter: drop-shadow(0 10px 15px rgba(0,0,0,0.3));
      /* A animação roda uma vez e para no estado final (forwards) */
      animation: floatUpAndFadeOut 4s ease-in forwards;
    }

    /* Keyframes para as caixas subindo */
    @keyframes floatUpAndFadeOut {
      0% {
        transform: translateY(0) rotateX(10deg) rotateZ(-5deg) scale(0.8);
        opacity: 0;
      }
      15% {
        opacity: 1;
      }
      85% {
        opacity: 1;
      }
      100% {
        /* Termina fora da tela em cima */
        transform: translateY(-110vh) rotateX(20deg) rotateZ(15deg) scale(1.1);
        opacity: 0;
      }
    }

    /* Variações para cada caixa (posição, tamanho, delay) */
    .intro-box:nth-child(1) { left: 10%; width: 120px; animation-duration: 3.5s; animation-delay: 0.1s; transform-origin: center left; }
    .intro-box:nth-child(2) { left: 30%; width: 90px;  animation-duration: 4.2s; animation-delay: 0.5s; transform-origin: bottom right; }
    .intro-box:nth-child(3) { left: 50%; width: 140px; animation-duration: 3.8s; animation-delay: 0.3s; transform-origin: bottom center; z-index: 2;}
    .intro-box:nth-child(4) { left: 70%; width: 100px; animation-duration: 4.5s; animation-delay: 0.7s; transform-origin: center right;}
    .intro-box:nth-child(5) { left: 85%; width: 110px; animation-duration: 3.9s; animation-delay: 0.2s; }
    
    .intro-box:nth-child(6) { left: 20%; width: 80px;  animation-duration: 4.1s; animation-delay: 1.2s; opacity: 0.8; }
    .intro-box:nth-child(7) { left: 60%; width: 130px; animation-duration: 3.6s; animation-delay: 1.0s; transform-origin: top left;}
    .intro-box:nth-child(8) { left: 40%; width: 95px;  animation-duration: 4.3s; animation-delay: 1.5s; }
    .intro-box:nth-child(9) { left: 5%;  width: 115px; animation-duration: 3.7s; animation-delay: 0.8s; }
    .intro-box:nth-child(10){ left: 90%; width: 85px;  animation-duration: 4.0s; animation-delay: 1.3s; }


    /* --- CONTEÚDO PRINCIPAL --- */
    .container {
      width: 100%;
      max-width: 450px;
      position: relative;
      z-index: 20;
      /* O container aparece suavemente */
    }

    .card {
      position: relative;
      padding: 40px 28px 32px;
      border-radius: 35px;
      background: rgba(14, 14, 16, 0.75);
      /* Bordas mais sofisticadas */
      border: 1px solid rgba(235, 180, 77, 0.15);
      box-shadow:
        0 30px 80px rgba(0, 0, 0, 0.7),
        inset 0 0 20px rgba(235, 180, 77, 0.05),
        inset 0 1px 0 rgba(255,255,255,0.08);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      overflow: hidden;
      
      opacity: 0;
      transform: translateY(40px);
      /* ATRASO IMPORTANTE: O cartão só aparece depois que as caixas começam a subir */
      animation: cardReveal 1.2s cubic-bezier(0.2, 0.8, 0.2, 1) 2.8s forwards;
    }

    /* Glow interno no topo do cartão */
    .card::before {
      content: "";
      position: absolute;
      top: -150px;
      left: 50%;
      transform: translateX(-50%);
      width: 300px;
      height: 300px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(241, 184, 76, 0.2), transparent 70%);
      filter: blur(30px);
      pointer-events: none;
    }

    .logo-wrap {
      width: 180px;
      height: 180px;
      margin: 0 auto 24px;
      border-radius: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8px;
      background: linear-gradient(145deg, rgba(255,255,255,0.03), rgba(0,0,0,0.2));
      border: 1px solid rgba(235, 180, 77, 0.3);
      box-shadow:
        0 25px 50px rgba(0,0,0,0.5),
        inset 0 1px 1px rgba(255,255,255,0.1);
      
      opacity: 0;
      transform: translateY(30px);
      /* Delays ajustados para a nova sequência */
      animation: fadeUp 1s ease 3.1s forwards;
    }

    .logo-wrap img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      border-radius: 24px;
    }

    .badge {
      width: fit-content;
      margin: 0 auto 16px;
      padding: 8px 16px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #f0c86f;
      background: linear-gradient(90deg, rgba(233, 170, 64, 0.1), rgba(233, 170, 64, 0.05));
      border: 1px solid rgba(233, 170, 64, 0.3);
      
      opacity: 0;
      transform: translateY(30px);
      animation: fadeUp 1s ease 3.3s forwards;
    }

    h1 {
      text-align: center;
      font-size: 36px;
      font-weight: 800;
      line-height: 1.1;
      margin-bottom: 12px;
      letter-spacing: -0.5px;
      
      opacity: 0;
      transform: translateY(30px);
      animation: fadeUp 1s ease 3.4s forwards;
    }

    h1 span {
      background: linear-gradient(to right, #f6cf7a, #dba13a);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      display: inline-block;
    }

    .subtitle {
      text-align: center;
      color: var(--text-muted);
      font-size: 15px;
      font-weight: 500;
      line-height: 1.7;
      max-width: 340px;
      margin: 0 auto 24px;
      
      opacity: 0;
      transform: translateY(30px);
      animation: fadeUp 1s ease 3.5s forwards;
    }

    .features {
      display: flex;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 28px;
      
      opacity: 0;
      transform: translateY(30px);
      animation: fadeUp 1s ease 3.6s forwards;
    }

    .feature {
      padding: 8px 14px;
      font-size: 12px;
      font-weight: 600;
      color: #fff;
      border-radius: 12px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      transition: 0.3s ease;
      cursor: default;
    }

    .feature:hover {
      transform: translateY(-2px);
      border-color: rgba(233, 170, 64, 0.5);
      background: rgba(233, 170, 64, 0.1);
      box-shadow: 0 4px 12px rgba(233, 170, 64, 0.1);
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .btn {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      text-decoration: none;
      min-height: 64px;
      padding: 0 24px;
      border-radius: 22px;
      font-weight: 700;
      font-size: 16px;
      letter-spacing: 0.3px;
      color: #050505;
      background: linear-gradient(135deg, var(--gold-1), var(--gold-2), var(--gold-3));
      box-shadow:
        0 16px 35px rgba(233, 170, 64, 0.25),
        inset 0 1px 0 rgba(255,255,255,0.4);
      overflow: hidden;
      transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
      
      opacity: 0;
      transform: translateY(30px);
      animation: fadeUp 1s ease forwards;
    }

    .btn:nth-child(1) { animation-delay: 3.8s; }
    .btn:nth-child(2) { animation-delay: 4.0s; }

    /* Efeito de brilho passando pelo botão */
    .btn::before {
      content: "";
      position: absolute;
      top: 0;
      left: -100%;
      width: 60%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.5), transparent);
      transform: skewX(-25deg);
      transition: left 0.7s ease;
    }

    .btn:hover {
      transform: translateY(-4px) scale(1.02);
      box-shadow:
        0 22px 50px rgba(233, 170, 64, 0.4),
        inset 0 1px 0 rgba(255,255,255,0.5);
    }

    .btn:hover::before {
      left: 150%;
    }

    .btn.secondary {
      color: #fff;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(233, 170, 64, 0.3);
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    .btn.secondary:hover {
      background: rgba(233, 170, 64, 0.08);
      border-color: rgba(233, 170, 64, 0.6);
      box-shadow: 0 10px 40px rgba(233, 170, 64, 0.1);
    }

    .btn svg {
      width: 22px;
      height: 22px;
      flex-shrink: 0;
      position: relative;
      z-index: 2;
    }

    .btn span {
      position: relative;
      z-index: 2;
    }

    .btn svg path {
      fill: currentColor;
    }

    .gold-line {
      width: 80px;
      height: 3px;
      margin: 28px auto 20px;
      border-radius: 4px;
      background: linear-gradient(90deg, transparent, #e4af4e, transparent);
      
      opacity: 0;
      transform: translateY(30px);
      animation: fadeUp 1s ease 4.2s forwards;
    }

    .footer {
      text-align: center;
      font-size: 12px;
      font-weight: 500;
      color: #888;
      line-height: 1.5;
      
      opacity: 0;
      transform: translateY(30px);
      animation: fadeUp 1s ease 4.3s forwards;
    }

    /* --- KEYFRAMES GERAIS --- */
    @keyframes cardReveal {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes floatGlow {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(-20px, 20px); }
    }

    @keyframes riseParticles {
      from { transform: translateY(0); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      to { transform: translateY(-105vh); opacity: 0; }
    }

    /* --- RESPONSIVO --- */
    @media (max-width: 480px) {
      body {
        padding: 16px 12px;
      }

      .card {
        padding: 32px 20px 28px;
        border-radius: 28px;
      }

      .logo-wrap {
        width: 150px;
        height: 150px;
      }

      h1 {
        font-size: 32px;
      }

      .subtitle {
        font-size: 14px;
      }

      .btn {
        min-height: 60px;
        font-size: 15px;
      }
      
      /* Ajuste das caixas flutuantes para mobile */
      .intro-box {
        width: 70px !important; /* Força um tamanho menor em mobile */
      }
    }
  </style>
</head>
